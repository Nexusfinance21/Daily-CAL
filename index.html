<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Daily"/>
<meta name="theme-color" content="#0B1D3A"/>
<title>Daily</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100vh;height:100dvh;overflow:hidden;background:#0B1D3A}
body{font-family:'DM Sans',sans-serif;color:#1A1A2E;overscroll-behavior:none}
#app{width:100%;height:100vh;height:100dvh;overflow:hidden;position:relative}

/* LOCK */
#lock{width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;position:relative}
.sky{position:absolute;top:0;left:0;right:0;bottom:0;z-index:0;transition:background 1.5s ease}
.sky.clear-day{background:linear-gradient(180deg,#1A6BB5 0%,#3A9DD8 50%,#7AC4F0 100%)}
.sky.clear-night{background:linear-gradient(180deg,#030712 0%,#0B1D3A 50%,#1B3A6B 100%)}
.sky.cloudy{background:linear-gradient(180deg,#4A5568 0%,#6B7280 40%,#9CA3AF 100%)}
.sky.drizzle{background:linear-gradient(180deg,#2D3748 0%,#4A5568 40%,#718096 100%)}
.sky.rainy{background:linear-gradient(180deg,#1F2937 0%,#374151 40%,#4B5563 100%)}
.sky.heavy-rain{background:linear-gradient(180deg,#111827 0%,#1F2937 40%,#374151 100%)}
.sky.stormy{background:linear-gradient(180deg,#0A0F1A 0%,#111827 50%,#1F2937 100%)}
.sky.snowy{background:linear-gradient(180deg,#CBD5E1 0%,#E2E8F0 50%,#F8FAFC 100%)}
.sky.sunrise{background:linear-gradient(180deg,#1A1A2E 0%,#7B3F6E 30%,#E8825A 60%,#F5C26B 100%)}
.sky.sunset{background:linear-gradient(180deg,#0B1D3A 0%,#4A2040 30%,#C0552A 60%,#E8A87C 100%)}
.cloud-layer{position:absolute;inset:0;z-index:2;pointer-events:none}
.cloud{position:absolute;border-radius:50px;filter:blur(8px);transition:transform .5s cubic-bezier(.22,.61,.36,1),filter .3s,opacity .3s}
.c1{width:220px;height:40px;top:18%;left:-10%;animation:drift1 25s linear infinite}
.c2{width:160px;height:30px;top:28%;right:-5%;animation:drift2 30s linear infinite}
.c3{width:280px;height:50px;top:42%;left:-15%;animation:drift1 35s linear infinite;opacity:.7}
.c4{width:120px;height:25px;top:58%;right:10%;animation:drift2 20s linear infinite;opacity:.5}
.c5{width:200px;height:35px;top:72%;left:-5%;animation:drift1 28s linear infinite;opacity:.4}
.theme-clear-day .cloud{background:rgba(255,255,255,0.45)}
.theme-clear-night .cloud{background:rgba(255,255,255,0.06)}
.theme-cloudy .cloud{background:rgba(255,255,255,0.25);filter:blur(12px)}
.theme-drizzle .cloud{background:rgba(200,215,230,0.3);filter:blur(13px)}
.theme-rainy .cloud{background:rgba(180,200,220,0.3);filter:blur(14px)}
.theme-heavy-rain .cloud{background:rgba(150,170,195,0.35);filter:blur(16px)}
.theme-stormy .cloud{background:rgba(100,110,130,0.5);filter:blur(18px)}
.theme-snowy .cloud{background:rgba(255,255,255,0.7);filter:blur(10px)}
.theme-sunrise .cloud{background:rgba(255,180,120,0.3)}
.theme-sunset .cloud{background:rgba(200,100,60,0.25)}
@keyframes drift1{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 300px))}}
@keyframes drift2{from{transform:translateX(0)}to{transform:translateX(calc(-100vw - 300px))}}

/* RAIN - 3 intensities */
.rain-layer{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.raindrop{position:absolute;border-radius:2px;animation:fall linear infinite}
.rain-drizzle .raindrop{width:1px;background:linear-gradient(to bottom,transparent,rgba(180,210,240,0.4))}
.rain-rain .raindrop{width:1.5px;background:linear-gradient(to bottom,transparent,rgba(160,200,235,0.65))}
.rain-heavy .raindrop{width:2.5px;background:linear-gradient(to bottom,transparent,rgba(130,180,225,0.85))}
@keyframes fall{from{transform:translateY(-30px) translateX(0)}to{transform:translateY(110vh) translateX(-20px)}}

/* SNOW */
.snow-layer{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.snowflake{position:absolute;border-radius:50%;background:rgba(255,255,255,0.8);animation:snowfall linear infinite}
@keyframes snowfall{from{transform:translateY(-10px) rotate(0deg)}to{transform:translateY(110vh) rotate(360deg)}}

/* STARS */
.star-layer{position:absolute;inset:0;z-index:1;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}

/* LIGHTNING */
@keyframes lightning{0%,92%,100%{opacity:0}94%,98%{opacity:.2}}
.lightning{position:absolute;inset:0;background:#fff;z-index:4;pointer-events:none;animation:lightning 4s infinite}

/* RIPPLE */
.touch-ripple{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,0.5);transform:scale(0);pointer-events:none;z-index:8;animation:rippleOut .7s ease-out forwards}
@keyframes rippleOut{to{transform:scale(1);opacity:0;width:120px;height:120px}}

/* LOCK LAYOUT */
.lock-top{position:relative;z-index:10;padding-top:max(env(safe-area-inset-top,44px),56px);padding-left:28px;padding-right:28px;padding-bottom:0;display:flex;justify-content:space-between;align-items:flex-start}
.lock-city-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:3px;opacity:.6}
.lock-city-name{font-size:15px;font-weight:500}
.lock-temp-big{font-family:'DM Mono',monospace;font-size:38px;font-weight:400;line-height:1;letter-spacing:-2px}
.lock-condition{font-size:11px;margin-top:2px;opacity:.7}
.lock-center{position:absolute;top:50%;left:0;right:0;transform:translateY(-54%);z-index:10;text-align:center;padding:0 28px;pointer-events:none}
.lock-time-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;opacity:.5}
.lock-date-big{font-size:90px;font-weight:300;line-height:1;letter-spacing:-5px}
.lock-weekday{font-size:15px;font-weight:300;margin-top:8px;letter-spacing:.05em;opacity:.75}
.lock-bottom{position:relative;z-index:10;padding:16px 28px max(env(safe-area-inset-bottom,16px),24px);margin-top:auto}
.lock-chore-title{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;opacity:.45}
.lock-chores{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.lock-chore{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:300}
.lock-chore-dot{width:4px;height:4px;border-radius:50%;background:#5B4FE9;flex-shrink:0}
.lock-chore.done .lock-chore-dot{background:#8BA888}
.lock-chore.done span{opacity:.4;text-decoration:line-through}
.lock-open-bar{display:flex;justify-content:center}
.lock-open{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.75);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:11px 26px;border-radius:30px;cursor:pointer;backdrop-filter:blur(10px)}

/* MAIN APP — phone: centred column */
#main{width:100%;height:100%;display:flex;flex-direction:column;background:#F0EDE8;overflow:hidden;position:relative}
@media(max-width:767px){
  #main{max-width:none}
  /* Breathing room on mobile */
  .scroll{padding:22px 18px 28px}
  .tabs{margin-bottom:22px;padding:4px}
  .tab{padding:11px 6px}
  .slbl{margin-top:24px;margin-bottom:14px}
  .citem{padding:16px 16px;margin-bottom:12px;border-radius:14px}
  .ccheck{width:22px;height:22px}
  .ctxt{font-size:15px}
  .qbtns{gap:8px;margin-bottom:12px;margin-top:2px}
  .qbtn{padding:8px 15px;font-size:12px}
  .sadd-btn{padding:15px 16px;margin-top:14px;font-size:14px}
  .add-btn-ghost{padding:16px;margin-top:10px;font-size:14px}
  .sitem{padding:14px 0}
  .intent-banner{padding:20px 20px;margin-bottom:22px}
  .jcard{padding:22px}
  .thought-input-wrap{padding:18px}
  .header{padding-bottom:20px}
  .week-strip{margin-top:4px}
}

/* ── TABLET (iPad, ≥768px) ───────────────────────── */
@media(min-width:768px){
  html,body{background:#0B1D3A}
  #app{position:fixed;inset:0}
  #lock{width:100%;height:100%;max-width:100%;margin:0;transform:none;border-radius:0;box-shadow:none;position:relative}
  #main{
    width:100%;
    height:100%;
    display:grid;
    grid-template-columns:240px 1fr;
    grid-template-rows:100%;
    grid-template-areas:"sidebar content";
    background:#F0EDE8;
    position:relative;
  }
  /* Shared sky — one continuous plane behind sidebar + header */
  #sky-plane{
    position:absolute;top:0;left:0;width:100%;height:340px;
    background:linear-gradient(180deg,#0B1D3A 0%,#122A52 55%,#1B3A6B 100%);
    z-index:0;pointer-events:none;overflow:hidden;
  }
  #sky-plane .skycloud{position:absolute;background:rgba(255,255,255,.06);border-radius:44px;filter:blur(11px)}
  /* Sidebar lower portion continues the sky downward, darker */
  #sidebar-lower-sky{
    position:absolute;left:0;top:300px;width:240px;bottom:0;
    background:linear-gradient(180deg,#1B3A6B 0%,#0E2140 40%,#081428 100%);
    z-index:0;pointer-events:none;
  }
  #sidebar{
    grid-area:sidebar;
    background:transparent;
    display:flex;flex-direction:column;
    padding:max(env(safe-area-inset-top,28px),40px) 0 max(env(safe-area-inset-bottom,20px),24px);
    overflow:hidden;
    position:relative;z-index:1;
  }
  #sidebar-clouds{display:none}
  #sidebar>*:not(#sidebar-clouds){position:relative;z-index:1}
  #content-area{
    grid-area:content;
    display:flex;flex-direction:column;
    overflow:hidden;
    background:transparent;
    position:relative;z-index:1;
  }
  #content-area .header{background:transparent!important}
  #content-area .header-sky-clouds{display:none}
  #content-area .scroll{background:#F0EDE8;border-radius:24px 24px 0 0;position:relative;z-index:1;flex:1;overflow-y:auto;padding-bottom:20px;min-height:0}
  /* Feathered soft edge where dark sidebar meets cream content */
  #content-area .header{padding-top:24px}
  #content-area .header::after{display:none}
  #bnav{display:none!important}
  .week-strip{display:none}
  #sidebar-top{padding:0 18px 18px;flex-shrink:0}
  #sidebar-logo{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:14px}
  #sidebar-weather{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(255,255,255,.05);border-radius:14px}
  #sidebar-temp{font-family:'DM Mono',monospace;font-size:20px;color:#fff;letter-spacing:-1px;flex-shrink:0}
  #sidebar-info{flex:1}
  #sidebar-info .si-city{font-size:12px;color:#fff;font-weight:500}
  #sidebar-info .si-cond{font-size:10px;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace;margin-top:1px}
  #sidebar-icon{font-size:20px;flex-shrink:0}
  #sidebar-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .snav-btn{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:13px;border:none;background:none;cursor:pointer;width:100%;text-align:left;transition:all .2s}
  .snav-btn:hover{background:rgba(255,255,255,.05)}
  .snav-btn.on{background:rgba(255,255,255,.12)}
  .snav-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
  .snav-lbl{font-size:13px;font-weight:500;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;transition:color .2s}
  .snav-btn.on .snav-lbl{color:#fff}
  #sidebar-week{padding:14px 12px 0;flex-shrink:0}
  .sw-day{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:11px;cursor:pointer;border:none;transition:all .2s;margin-bottom:2px}
  .sw-day:hover{background:rgba(255,255,255,.04)}
  .sw-day.sel{background:rgba(255,255,255,.1)}
  .sw-day.tod:not(.sel){background:rgba(91,79,233,.14)}
  .sw-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);width:28px;flex-shrink:0}
  .sw-day.sel .sw-lbl,.sw-day.tod .sw-lbl{color:rgba(255,255,255,.75)}
  .sw-num{font-size:14px;font-weight:500;color:rgba(255,255,255,.45)}
  .sw-day.sel .sw-num{color:#fff}
  .sw-day.tod:not(.sel) .sw-num{color:#A8D8FF}
  .sw-dot{width:5px;height:5px;border-radius:50%;background:#E8A87C;margin-left:auto;flex-shrink:0}
  #sidebar-date{padding:14px 18px 0;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.05em;line-height:1.6;flex-shrink:0}
  @keyframes skydrift1{from{transform:translateX(-160px)}to{transform:translateX(100vw)}}
  @keyframes skydrift2{from{transform:translateX(100vw)}to{transform:translateX(-200px)}}
  #sky-plane .sc1{width:180px;height:30px;top:14%;animation:skydrift1 55s linear infinite}
  #sky-plane .sc2{width:130px;height:24px;top:30%;animation:skydrift2 68s linear infinite;opacity:.7}
  #sky-plane .sc3{width:220px;height:34px;top:48%;animation:skydrift1 62s linear infinite;opacity:.6}
  #sky-plane .sc4{width:110px;height:20px;top:66%;animation:skydrift2 48s linear infinite;opacity:.5}
  #sky-plane .sc5{width:160px;height:26px;top:80%;animation:skydrift1 58s linear infinite;opacity:.45}
}

/* ── DESKTOP (≥1200px) — add right panel ─────────── */
@media(min-width:1200px){
  #main{
    grid-template-columns:260px 1fr 300px;
    grid-template-areas:"sidebar content right-panel";
    max-width:100%;
  }
  #sidebar-lower-sky{width:260px}
  #right-panel{
    grid-area:right-panel;
    background:linear-gradient(180deg,#EDE9E2 0%,#E8E3DC 100%);
    overflow-y:auto;
    padding:28px 18px;
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:-14px 0 24px -10px rgba(120,110,95,.22);
  }
  #right-panel::before{
    content:'';position:absolute;left:0;top:0;bottom:0;width:24px;
    background:linear-gradient(90deg,rgba(150,140,120,.10),transparent);
    pointer-events:none;
  }
  #right-panel::-webkit-scrollbar{display:none}
  #right-panel .rp-hdr{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#B8B0A8;margin-bottom:14px}
}
@media(max-width:1199px){
  #right-panel{display:none!important}
}

/* DIRECTIONAL PULL animations — content slides across, tracked all the way */
@keyframes pullOutLeft{0%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(-60px)}}
@keyframes pullInRight{0%{opacity:0;transform:translateX(80px)}60%{opacity:1}100%{opacity:1;transform:translateX(0)}}
@keyframes pullInLeft{0%{opacity:0;transform:translateX(-80px)}60%{opacity:1}100%{opacity:1;transform:translateX(0)}}
.nav-animating .scroll{animation:pullOutLeft .24s cubic-bezier(.4,0,1,1) forwards}
.nav-entering .scroll{animation:pullInRight .4s cubic-bezier(.16,.84,.44,1)}
.nav-entering-left .scroll{animation:pullInLeft .4s cubic-bezier(.16,.84,.44,1)}

/* PRESSABLE panel cards */
.rp-pressable{cursor:pointer;transition:transform .18s,box-shadow .18s}
.rp-pressable:active{transform:scale(.97)}
.rp-press-hint{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#B8B0A8;margin-top:8px;text-align:center;opacity:.7}

/* WATER TRACKER */
.water-card{background:#fff;border-radius:16px;padding:16px;margin-top:14px}
.water-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#B8B0A8;margin-bottom:4px}
.water-q{font-size:13px;color:#1A1A2E;font-weight:500;margin-bottom:14px;line-height:1.4}
.water-glasses{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.water-glass{font-size:22px;cursor:pointer;transition:transform .15s;filter:grayscale(1) opacity(.35)}
.water-glass.on{filter:none;transform:scale(1.05)}
.water-glass:active{transform:scale(.85)}
.water-count{font-family:'DM Mono',monospace;font-size:11px;color:#5B9BD5;text-align:center;font-weight:500}

/* HEALTH BAR trigger (plan) */
.healthbar-trigger{width:100%;background:linear-gradient(135deg,#5B4FE9 0%,#7B3F9E 100%);border:none;border-radius:16px;padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-top:8px;transition:transform .15s}
.healthbar-trigger:active{transform:scale(.98)}
.hbt-icon{font-size:22px}
.hbt-text{flex:1;text-align:left}
.hbt-title{font-size:14px;font-weight:600;color:#fff}
.hbt-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
.hbt-arrow{color:rgba(255,255,255,.6);font-size:16px}

/* HEALTH POPUP MODAL */
.health-modal-overlay{position:fixed;inset:0;background:rgba(11,29,58,.6);display:flex;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(10px);padding:24px;animation:ovFade .3s ease}
.health-modal{width:100%;max-width:400px;max-height:88vh;overflow-y:auto;background:#F5F2ED;border-radius:26px;padding:24px 20px;box-shadow:0 30px 80px rgba(10,15,40,.5);animation:sheetPop .4s cubic-bezier(.34,1.56,.64,1)}
.health-modal::-webkit-scrollbar{display:none}
.hm-close{position:sticky;top:0;float:right;width:32px;height:32px;border-radius:50%;border:none;background:#E7E2DA;color:#1A1A2E;font-size:16px;cursor:pointer;z-index:2}
.hm-title{font-size:20px;font-weight:600;color:#1A1A2E;margin-bottom:3px}
.hm-sub{font-size:12px;color:#B8B0A8;margin-bottom:20px;font-family:'DM Mono',monospace;letter-spacing:.03em}

/* HEADER */
.header{background:linear-gradient(180deg,#0B1D3A 0%,#1B3A6B 100%);padding-left:20px;padding-right:20px;padding-bottom:14px;padding-top:max(env(safe-area-inset-top,44px),48px);position:relative;overflow:hidden;flex-shrink:0}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:#F0EDE8;border-radius:20px 20px 0 0}
.header-sky-clouds{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hc{position:absolute;background:rgba(255,255,255,.08);border-radius:40px;filter:blur(6px)}
.hc1{width:160px;height:28px;top:30%;left:-20px;animation:drift1 20s linear infinite}
.hc2{width:120px;height:22px;top:55%;right:-10px;animation:drift2 25s linear infinite}
.header-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;margin-bottom:12px}
.header-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.4);text-transform:uppercase}
.header-actions{display:flex;gap:8px}
.ibtn{width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(10px);transition:background .15s}
.ibtn:active{background:rgba(255,255,255,.2)}
/* Weather pill */
.header-weather{display:flex;align-items:center;position:relative;z-index:2;margin-bottom:12px;padding:10px 12px;background:rgba(255,255,255,.07);border-radius:14px;border:1px solid rgba(255,255,255,.1)}
.hw-left{display:flex;align-items:center;gap:10px;flex:1}
.hw-temp{font-family:'DM Mono',monospace;font-size:24px;color:#fff;letter-spacing:-1px;line-height:1}
.hw-info{display:flex;flex-direction:column;gap:1px}
.hw-city{font-size:13px;color:#fff;font-weight:500}
.hw-date{font-size:10px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace}
.hw-icon{font-size:24px}
.hw-right{display:flex;align-items:center;gap:6px}
.hw-cond{font-size:10px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace}
/* Week strip */
.week-strip{display:flex;gap:4px;position:relative;z-index:2}
.wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.wday.sel{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.25)}
.wday.tod:not(.sel){border-color:rgba(91,79,233,.7);background:rgba(91,79,233,.1)}
.wday-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:'DM Mono',monospace}
.wday.sel .wday-lbl,.wday.tod .wday-lbl{color:rgba(255,255,255,.85)}
.wday-num{font-size:16px;font-weight:500;color:rgba(255,255,255,.6);line-height:1}
.wday.sel .wday-num{color:#fff;font-weight:600}
.wday.tod:not(.sel) .wday-num{color:#A8D8FF}
.wday-dot{width:4px;height:4px;border-radius:50%;background:#E8A87C;margin-top:1px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:16px 16px 24px;-webkit-overflow-scrolling:touch;min-height:0}
.scroll::-webkit-scrollbar{display:none}

/* INTENTION BANNER */
.intent-banner{background:linear-gradient(135deg,#1A1A2E,#2D1B69);border-radius:16px;padding:16px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.intent-banner::before{content:'✦';position:absolute;right:16px;top:12px;font-size:24px;color:rgba(255,255,255,.1)}
.intent-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:6px}
.intent-quote{font-size:14px;font-weight:300;color:#fff;line-height:1.6;font-style:italic}

/* TABS — refined */
.tabs{display:flex;background:#E5E0D8;border-radius:12px;padding:3px;margin-bottom:16px;gap:2px}
.tab{flex:1;padding:8px 6px;border:none;background:none;border-radius:9px;font-size:11px;font-weight:500;color:#B8B0A8;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
.tab.on{background:#fff;color:#1A1A2E;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.tab:active{transform:scale(.96)}

/* LABELS */
.slbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#B8B0A8;margin-bottom:10px;margin-top:16px}
.slbl:first-child{margin-top:0}

/* SCHEDULE */
.sched-list{position:relative}
.sched-list::before{content:'';position:absolute;left:40px;top:10px;bottom:10px;width:1px;background:linear-gradient(to bottom,#5B4FE944,#E2DDD888,transparent)}
.sitem{display:flex;align-items:center;gap:14px;padding:10px 0;cursor:pointer}
.stime{font-family:'DM Mono',monospace;font-size:11px;color:#B8B0A8;width:40px;flex-shrink:0}
.sdot{width:9px;height:9px;border-radius:50%;background:#F0EDE8;border:2px solid #D8D0C8;flex-shrink:0;position:relative;z-index:1}
.sitem.now .sdot{background:#5B4FE9;border-color:#5B4FE9;box-shadow:0 0 0 3px #5B4FE922}
.sitem.past .sdot{background:#8BA888;border-color:#8BA888}
.slabel{font-size:14px;color:#1A1A2E;flex:1}
.sitem.now .slabel{font-weight:600;color:#5B4FE9}
.sitem.past .slabel{color:#B8B0A8}
/* inline tap actions */
.sitem-btns{display:flex;gap:6px;padding:2px 0 10px 54px}
.sitem-btn{padding:6px 14px;border-radius:8px;border:1px solid #E0DCD6;background:#F7F4F0;color:#1A1A2E;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500}
.sadd-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed #D8D0C8;border-radius:12px;background:none;color:#B8B0A8;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;width:100%}

/* CHORES */
.citem{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-radius:12px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent}
.citem.done{opacity:.5}
.ccheck{width:20px;height:20px;border-radius:6px;border:2px solid #E2DDD8;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s}
.citem.done .ccheck{background:#8BA888;border-color:#8BA888;color:#fff}
.ctxt{font-size:14px;flex:1}
.citem.done .ctxt{text-decoration:line-through}
.add-row{display:flex;gap:8px;margin-top:4px}
.add-inp{flex:1;padding:10px 14px;border:1.5px solid #5B4FE9;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;color:#1A1A2E}
.add-save{padding:10px 16px;background:#5B4FE9;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.add-btn-ghost{width:100%;padding:11px;border:1.5px dashed #D8D0C8;border-radius:12px;background:none;color:#B8B0A8;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}

/* JOURNAL */
.jcard{background:#1A1A2E;border-radius:16px;padding:18px}
.jlbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px}
.jta{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;font-family:'DM Sans',sans-serif;resize:none;outline:none;min-height:80px;line-height:1.6}
.jta::placeholder{color:rgba(255,255,255,.3)}
.jsave{margin-top:10px;padding:9px 20px;background:#5B4FE9;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}

/* RIGHT PANEL week cards */
.wcard{background:#fff;border-radius:12px;padding:12px 14px;cursor:pointer;border:1.5px solid transparent;transition:border-color .15s}
.wcard.today{border-color:#5B4FE9}
.wcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.wcard-name{font-size:13px;font-weight:600;color:#1A1A2E}
.wcard-sub{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A8;margin-left:5px}
.wcard-done{font-family:'DM Mono',monospace;font-size:10px;color:#8BA888;margin-top:5px}
.badge{font-size:9px;background:#5B4FE9;color:#fff;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:16px;background:#F0EDE8;color:#B8B0A8}
.empty{text-align:center;color:#B8B0A8;font-size:13px;padding:24px 0}

/* WEEK VIEW — intention banner */
.week-intent-banner{
  background:linear-gradient(135deg,#1A1A2E 0%,#2D1B69 100%);
  border-radius:16px;padding:18px 20px;margin-bottom:20px;
  position:relative;overflow:hidden;cursor:default;
}
.week-intent-banner::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(91,79,233,.25),transparent 60%);pointer-events:none}
.wib-icon{font-size:16px;display:block;margin-bottom:8px;opacity:.6}
.wib-text{font-size:15px;font-weight:300;color:#fff;line-height:1.6;font-style:italic;margin-bottom:8px}
.wib-day{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.wib-cta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#A08FFF;cursor:pointer;margin-top:6px}

/* WEEK VIEW — 7-cube grid */
.week-cube-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-bottom:16px;
}
@media(max-width:600px){
  .week-cube-grid{grid-template-columns:repeat(4,1fr)}
}
.week-cube{
  background:#fff;border-radius:14px;
  padding:12px 8px 10px;
  cursor:pointer;border:1.5px solid transparent;
  transition:all .2s;
  display:flex;flex-direction:column;gap:8px;
  min-height:160px;
}
.week-cube:hover{border-color:#D8D0C8;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.wc-today{border-color:#5B4FE9!important;background:linear-gradient(160deg,#faf9ff 0%,#f0eeff 100%)}
.wc-sel{box-shadow:0 0 0 2px #5B4FE9}
.wc-top{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.wc-day{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.18em;color:#B8B0A8;text-transform:uppercase}
.wc-num{font-size:20px;font-weight:600;color:#1A1A2E;line-height:1}
.wc-today .wc-num{color:#5B4FE9}
.wc-today-dot{width:4px;height:4px;border-radius:50%;background:#5B4FE9;position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)}
/* 6 time-block strips */
.wc-blocks{
  display:flex;flex-direction:column;gap:3px;flex:1;
}
.wc-ev-chip{display:flex;flex-direction:column;gap:1px;background:#F7F4EF;border-radius:5px;padding:3px 5px;overflow:hidden}
.wc-ev-chip-time{font-family:'DM Mono',monospace;font-size:7px;color:#8B93B8;letter-spacing:.03em;line-height:1}
.wc-ev-chip-label{font-size:9px;color:#1A1A2E;font-weight:500;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-empty-bar{flex:1;display:flex;align-items:center;justify-content:center;color:#D8D0C8;font-size:12px;min-height:24px}
.wc-block{
  height:100%;min-height:12px;border-radius:4px;
  background:#F0EDE8;
  transition:all .2s;flex:1;
}
.wc-block-filled{
  border-radius:4px;
}
/* Footer */
.wc-footer{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
.wc-chore-pill{font-family:'DM Mono',monospace;font-size:8px;color:#8BA888;background:#F0EDE8;padding:2px 6px;border-radius:8px}
.wc-intent-dot{width:6px;height:6px;border-radius:50%;background:#A08FFF;flex-shrink:0}
.wc-ev-count{font-family:'DM Mono',monospace;font-size:8px;color:#B8B0A8}

/* PLAN VIEW */
.plan-strip{display:flex;overflow-x:auto;gap:8px;padding:0 0 4px;margin-bottom:16px;scrollbar-width:none}
.plan-strip::-webkit-scrollbar{display:none}
.plan-day-pill{padding:6px 14px;border-radius:20px;border:1.5px solid #D8D0C8;background:none;color:#B8B0A8;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500}
.plan-day-pill.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
.plan-header{margin-bottom:16px}
.plan-title{font-size:18px;font-weight:600;color:#1A1A2E}
.plan-sub{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A8;margin-top:3px}
.qbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1.5px solid #D8D0C8;background:none;color:#B8B0A8;cursor:pointer;font-family:'DM Sans',sans-serif}
.divider{height:1px;background:#D8D0C8;margin:20px 0}
.bp-item{margin-bottom:10px}
.bp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.bp-name{font-size:13px;font-weight:600}
.bp-meta{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A8}
.bp-intent{padding:10px 14px;background:#fff;border-radius:10px;font-size:13px;cursor:pointer}

/* BOTTOM NAV — refined */
#bnav{flex-shrink:0;background:#F8F5F1;border-top:1px solid #EAE6E0;display:flex;flex-direction:row;padding-top:8px;padding-bottom:max(env(safe-area-inset-bottom,20px),24px);z-index:50}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 0;transition:transform .15s}
.nbtn:active{transform:scale(.88)}
.nbtn-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .25s;background:transparent}
.nbtn.on .nbtn-icon{background:#5B4FE9;box-shadow:0 4px 14px rgba(91,79,233,.35)}
.nlbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#C4BCBA;font-family:'DM Mono',monospace;transition:color .2s}
.nbtn.on .nlbl{color:#5B4FE9}

/* MODAL — centered, animated */
.moverlay{position:fixed;inset:0;background:rgba(26,26,46,.55);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);padding:24px;animation:ovFade .25s ease}
@keyframes ovFade{from{opacity:0}to{opacity:1}}
.msheet{width:100%;max-width:360px;background:#F5F2ED;border-radius:24px;padding:26px 22px 22px;box-shadow:0 24px 70px rgba(10,15,40,.4);animation:sheetPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes sheetPop{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhandle{display:none}
.mtitle{font-size:19px;font-weight:600;margin-bottom:4px;color:#1A1A2E}
.msub{font-size:12px;color:#B8B0A8;margin-bottom:20px;font-family:'DM Mono',monospace;letter-spacing:.03em}
.minput{width:100%;padding:14px 16px;border:1.5px solid #E0DAD2;border-radius:14px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;color:#1A1A2E;margin-bottom:12px;transition:border-color .2s;-webkit-appearance:none;appearance:none;display:block;min-height:50px;line-height:1.2}
.minput[type=time]{-webkit-appearance:none;appearance:none;text-align:left}
.minput::-webkit-date-and-time-value{text-align:left;margin:0}
.minput:focus{border-color:#5B4FE9;box-shadow:0 0 0 3px rgba(91,79,233,.1)}
.mrow{display:flex;gap:10px;margin-top:6px}
.mbtn{flex:1;padding:14px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .12s}
.mbtn:active{transform:scale(.96)}
.mbtn.pri{background:#1A1A2E;color:#fff}
.mbtn.sec{background:#E7E2DA;color:#1A1A2E}

/* HEALTH PANEL */
.health-hero{background:linear-gradient(150deg,#5B4FE9 0%,#7B3F9E 55%,#C0552A 120%);border-radius:20px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;cursor:pointer}
.health-hero::after{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);border-radius:50%}
.hh-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:6px}
.hh-title{font-size:17px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:4px;position:relative;z-index:1}
.hh-sub{font-size:12px;color:rgba(255,255,255,.7);line-height:1.5;position:relative;z-index:1}
.hh-cta{margin-top:14px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:20px;position:relative;z-index:1}
.health-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.hstat{background:#fff;border-radius:14px;padding:12px 10px;text-align:center;border:1.5px solid transparent;transition:border-color .2s}
.hstat:focus-within{border-color:#5B4FE9}
.hstat-lbl{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#B8B0A8;margin-bottom:4px}
.hstat-inp{width:100%;border:none;background:none;text-align:center;font-size:20px;font-weight:600;color:#1A1A2E;outline:none;font-family:'DM Sans',sans-serif}
.hstat-inp::placeholder{color:#D8D0C8}
.hstat-unit{font-size:9px;color:#B8B0A8;font-family:'DM Mono',monospace;margin-top:1px}
.hmood-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
.hmood-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#B8B0A8;margin-bottom:12px}
.hmood-row{display:flex;justify-content:space-between;gap:6px}
.hmood-btn{flex:1;aspect-ratio:1;border-radius:14px;border:1.5px solid #EAE5DD;background:#FAF8F4;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.hmood-btn:active{transform:scale(.9)}
.hmood-btn.on{border-color:#5B4FE9;background:#F0EEFF;transform:scale(1.08)}
.hupsell{background:linear-gradient(135deg,#1A1A2E,#2D1B69);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.hup-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#A08FFF;margin-bottom:8px}
.hup-title{font-size:15px;font-weight:600;color:#fff;line-height:1.4;margin-bottom:6px}
.hup-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.55;margin-bottom:14px}
.hup-btns{display:flex;gap:8px;flex-wrap:wrap}
.hup-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-family:'DM Sans',sans-serif;padding:9px 14px;border-radius:20px;cursor:pointer;font-weight:500}
.hup-btn.solid{background:#5B4FE9;border-color:#5B4FE9}

/* DAY PREVIEW in right panel */
.dp-hdr{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#B8B0A8;margin-bottom:12px}
.dp-title{font-size:16px;font-weight:600;color:#1A1A2E;margin-bottom:2px}
.dp-sub{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A8;margin-bottom:16px}
.dp-sec{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#B8B0A8;margin:14px 0 8px}
.dp-ev{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px solid #E8E3DC}
.dp-ev-time{font-family:'DM Mono',monospace;font-size:10px;color:#5B4FE9;width:40px;flex-shrink:0}
.dp-ev-label{font-size:13px;color:#1A1A2E}
.dp-chore{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:#4A4458}
.dp-chore-dot{width:5px;height:5px;border-radius:50%;background:#8BA888;flex-shrink:0}
.dp-empty{font-size:12px;color:#B8B0A8;font-style:italic;padding:8px 0}

/* CONFIRM */
.confirm-overlay{position:fixed;inset:0;background:rgba(26,26,46,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:32px}
.confirm-box{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:320px}
.confirm-msg{font-size:15px;color:#1A1A2E;line-height:1.5;margin-bottom:20px;text-align:center}
.confirm-row{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:12px;border-radius:12px;border:none;background:#F0EDE8;color:#1A1A2E;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.confirm-ok{flex:1;padding:12px;border-radius:12px;border:none;background:#1A1A2E;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

/* LONG PRESS MENU */
.menu-overlay{position:fixed;inset:0;z-index:299;background:transparent}
.action-menu{position:fixed;z-index:300;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden;min-width:170px;animation:menuPop .15s ease}
@keyframes menuPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.action-menu-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;width:100%;text-align:left;color:#1A1A2E}
.action-menu-item.danger{color:#E85454}
.action-menu-divider{height:1px;background:#F0EDE8;margin:0}

/* THOUGHTS */
.thought-input-wrap{background:#fff;border-radius:16px;padding:14px;margin-bottom:12px;border:1.5px solid transparent;transition:border-color .2s}
.thought-input-wrap:focus-within{border-color:#5B4FE9}
.thought-ta{width:100%;border:none;background:none;font-size:15px;font-family:'DM Sans',sans-serif;color:#1A1A2E;resize:none;outline:none;line-height:1.6;min-height:80px}
.thought-ta::placeholder{color:#B8B0A8}
.thought-footer{display:flex;justify-content:flex-end;margin-top:8px}
.thought-save{padding:8px 18px;background:#5B4FE9;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.thought-item{background:#fff;border-radius:12px;padding:13px 15px;margin-bottom:8px;position:relative}
.thought-text{font-size:14px;color:#1A1A2E;line-height:1.6;margin-bottom:5px}
.thought-meta{font-family:'DM Mono',monospace;font-size:10px;color:#B8B0A8}
.thought-del{position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;color:#D0C8C0;cursor:pointer;padding:2px 6px;line-height:1}

/* HEADER — lock-screen style row */
.hdr-lock-row{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2;margin-bottom:14px}
.hl-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.hl-city{font-size:15px;font-weight:500;color:#fff}
.hl-right{text-align:right}
.hl-temp{font-family:'DM Mono',monospace;font-size:32px;color:#fff;letter-spacing:-2px;line-height:1}
.hl-cond{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px;font-family:'DM Mono',monospace}

<body>
<div id="app"></div>
<script>
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const QUICK=["Morning routine","Deep work","Lunch","Calls & emails","Admin","Reading","Wind down","Meditation","Study"];

function today(){const d=new Date();return pad(d);}
function pad(d){return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());}
function z(n){return String(n).padStart(2,"0");}
function addDays(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return pad(d);}
function weekOf(s){const d=new Date(s+"T12:00:00");const day=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(day===0?6:day-1));return Array.from({length:7},(_,i)=>{const n=new Date(m);n.setDate(m.getDate()+i);return n;});}
function blockSt(t,dk){const h=parseInt(t);const cur=new Date().getHours();if(dk!==today())return"";if(h<cur)return"past";if(h===cur)return"now";return"";}
function ls(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function fmtDate(s){const d=new Date(s+"T12:00:00");return DAYS[d.getDay()]+", "+d.getDate()+" "+MONTHS[d.getMonth()];}

const T=today();
const MKEY=T.slice(0,7);
const DAILY_DEFAULTS=["Pray","Workout"];
const initDay={chores:[],schedule:[],journal:"",temp:"--"};

let S={
  view:"lock",tab:"chores",nav:"today",
  sel:T,planDay:addDays(T,1),
  data:ls("dc2-data",{[T]:{chores:DAILY_DEFAULTS.slice(),schedule:[],journal:"",temp:"--"}}),
  done:ls("dc2-done",{}),
  adding:false,newChore:"",
  modal:false,mtime:"",mval:"",mdest:"",meditIdx:null,
  jdraft:{},
  weather:{temp:null,city:null,icon:"☀️",cond:"Clear",ok:false,rawCode:0},
  toast:null,openSwipe:null,
  thoughts:ls("dc2-thoughts",[]),thoughtDraft:"",
  actionMenu:null,
  confirmMsg:null,confirmAction:null,
  activeSchedItem:null,
  userName:ls("dc2-name","Isaac"),
  brief:ls("dc2-brief",null),
  briefLoading:false,
  mIntent:ls("dc2-mintent",{}),
  mDraft:{},
  planMonth:T.slice(0,7),
  health:ls("dc2-health",{weight:"",height:"",bpm:"",moods:{}}),
  hDraft:null,
  water:ls("dc2-water",{}),
  healthModal:false,
  navAnim:null,
  navEntering:false
};

function set(patch){Object.assign(S,patch);render();}
function showToast(msg){S.toast=msg;render();setTimeout(function(){S.toast=null;render();},2000);}
function day(k){return S.data[k]||{chores:DAILY_DEFAULTS.slice(),schedule:[],journal:"",temp:"--"};}
function done(dk,i){return !!S.done[dk+"-"+i];}
function ensure(k){if(!S.data[k])S.data[k]={chores:DAILY_DEFAULTS.slice(),schedule:[],journal:"",temp:"--"};}

function toggleDone(dk,i){const k=dk+"-"+i;const d=Object.assign({},S.done);d[k]=!d[k];ss("dc2-done",d);set({done:d});}

function deleteChore(dk,i){
  const chores=day(dk).chores.filter(function(_,j){return j!==i;});
  const newDone={};
  Object.keys(S.done).forEach(function(k){
    const parts=k.split("-");const idx=parseInt(parts[parts.length-1]);
    const ddk=parts.slice(0,-1).join("-");
    if(ddk!==dk){newDone[k]=S.done[k];return;}
    if(idx===i)return;
    newDone[ddk+"-"+(idx>i?idx-1:idx)]=S.done[k];
  });
  const d=Object.assign({},S.data);d[dk]=Object.assign({},day(dk),{chores:chores});
  ss("dc2-data",d);ss("dc2-done",newDone);set({data:d,done:newDone,actionMenu:null});showToast("Deleted");
}

function deleteEvent(dk,i){
  const schedule=day(dk).schedule.filter(function(_,j){return j!==i;});
  const d=Object.assign({},S.data);d[dk]=Object.assign({},day(dk),{schedule:schedule});
  ss("dc2-data",d);set({data:d,activeSchedItem:null});showToast("Deleted");
}

function editEvent(dk,i){
  const ev=day(dk).schedule[i];
  set({modal:true,mdest:dk,mtime:ev.time,mval:ev.label,meditIdx:i,activeSchedItem:null});
}

function saveEvent(){
  if(!S.mval.trim()||!S.mtime)return;
  const dest=S.mdest;ensure(dest);
  let schedule;
  if(S.meditIdx!==null&&S.meditIdx!==undefined){
    schedule=day(dest).schedule.map(function(ev,i){return i===S.meditIdx?{time:S.mtime,label:S.mval}:ev;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  } else {
    schedule=day(dest).schedule.concat([{time:S.mtime,label:S.mval}]).sort(function(a,b){return a.time.localeCompare(b.time);});
  }
  const d=Object.assign({},S.data);d[dest]=Object.assign({},day(dest),{schedule:schedule});
  ss("dc2-data",d);set({data:d,modal:false,mtime:"",mval:"",meditIdx:null});
  showToast(S.meditIdx!==null?"Updated ✓":"Event added ✓");
}

function addChore(dest){
  if(!S.newChore.trim())return;
  ensure(dest);
  const d=Object.assign({},S.data);d[dest]=Object.assign({},day(dest),{chores:day(dest).chores.concat([S.newChore.trim()])});
  ss("dc2-data",d);set({data:d,newChore:"",adding:false});showToast("Added ✓");
}

function addQuick(label,dest){
  ensure(dest);
  if(day(dest).chores.indexOf(label)>=0)return;
  const d=Object.assign({},S.data);d[dest]=Object.assign({},day(dest),{chores:day(dest).chores.concat([label])});
  ss("dc2-data",d);set({data:d});showToast('"'+label+'" added');
}

function saveJournal(dk){
  const val=S.jdraft[dk];if(val===undefined||!val.trim())return;
  ensure(dk);
  const d=Object.assign({},S.data);d[dk]=Object.assign({},day(dk),{journal:val});
  ss("dc2-data",d);set({data:d});showToast("Intention set ✦");
}

function saveMonthIntent(mk2){
  const val=S.mDraft[mk2];if(val===undefined||!val.trim())return;
  const m=Object.assign({},S.mIntent);m[mk2]=val.trim();
  ss("dc2-mintent",m);set({mIntent:m});showToast("Month theme set ✦");
}

function saveHealth(field,val){
  const h=Object.assign({},S.health);h[field]=val;
  ss("dc2-health",h);S.health=h;
}
function setMood(rating){
  const h=Object.assign({},S.health);
  const moods=Object.assign({},h.moods);moods[today()]=rating;
  h.moods=moods;ss("dc2-health",h);set({health:h});showToast("Logged ✦");
}
function setWater(n){
  const w=Object.assign({},S.water);w[today()]=n;
  ss("dc2-water",w);set({water:w});
}
var NAV_ORDER={today:0,week:1,plan:2};
function navTo(target){
  var fromRight=(NAV_ORDER[target]>=NAV_ORDER[S.nav]);
  S.navAnim=target;render();
  setTimeout(function(){
    S.nav=target;S.navAnim=null;
    S.navEntering=fromRight?"right":"left";render();
    setTimeout(function(){S.navEntering=false;},400);
  },230);
}

function addThought(){
  if(!S.thoughtDraft.trim())return;
  const t={id:Date.now(),text:S.thoughtDraft.trim(),time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),date:today()};
  const thoughts=[t].concat(S.thoughts);
  ss("dc2-thoughts",thoughts);set({thoughts:thoughts,thoughtDraft:""});showToast("Saved ✦");
}

function deleteThought(id){
  const thoughts=S.thoughts.filter(function(t){return t.id!==id;});
  ss("dc2-thoughts",thoughts);set({thoughts:thoughts,actionMenu:null});showToast("Deleted");
}

function confirmDelete(msg,onConfirm){
  set({confirmMsg:msg,confirmAction:onConfirm});
}

function showMenu(e,items){
  e.preventDefault();e.stopPropagation();
  const rect=e.currentTarget?e.currentTarget.getBoundingClientRect():null;
  const x=rect?Math.min(rect.left,window.innerWidth-190):e.clientX;
  const y=rect?rect.bottom+4:e.clientY;
  set({actionMenu:{x:x,y:y,items:items}});
}

function longPress(el2,items){
  let timer=null;
  el2.addEventListener("touchstart",function(e){
    timer=setTimeout(function(){
      navigator.vibrate&&navigator.vibrate(30);
      const touch=e.touches[0];
      const x=Math.min(touch.clientX,window.innerWidth-190);
      const y=Math.min(touch.clientY+10,window.innerHeight-200);
      set({actionMenu:{x:x,y:y,items:items}});
    },500);
  },{passive:true});
  el2.addEventListener("touchend",function(){clearTimeout(timer);},{passive:true});
  el2.addEventListener("touchmove",function(){clearTimeout(timer);},{passive:true});
  el2.addEventListener("contextmenu",function(e){e.preventDefault();showMenu(e,items);});
}

function fetchWeather(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    Promise.all([
      fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,weathercode&temperature_unit=celsius&timezone=auto"),
      fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lon+"&format=json")
    ]).then(function(rs){return Promise.all(rs.map(function(r){return r.json();}));}).then(function(data){
      const wD=data[0],gD=data[1];
      const temp=Math.round(wD.current.temperature_2m);
      const code=wD.current.weathercode;
      const icon=code===0?"☀️":code<=3?"⛅":code<=67?"🌧️":code<=77?"❄️":"🌩️";
      const cond=code===0?"Clear sky":code<=3?"Partly cloudy":code<=67?"Rainy":code<=77?"Snowy":"Stormy";
      const a=gD.address||{};
      const city=a.city||a.town||a.village||a.suburb||a.county||"Your location";
      set({weather:{temp:temp,city:city,icon:icon,cond:cond,ok:true,rawCode:code}});
    }).catch(function(){});
  },function(){},{timeout:10000,maximumAge:300000});
}

function initGyro(){
  if(typeof DeviceOrientationEvent==="undefined")return;
  if(typeof DeviceOrientationEvent.requestPermission==="function"){
    document.addEventListener("click",async function req(){
      try{await DeviceOrientationEvent.requestPermission();}catch(e){}
      document.removeEventListener("click",req);listenGyro();
    },{once:true});
  } else {listenGyro();}
}
function listenGyro(){
  window.addEventListener("deviceorientation",function(e){
    if(!e.beta&&!e.gamma)return;
    const x=(e.gamma||0)/30,y=(e.beta||0)/30;
    document.querySelectorAll(".cloud,.hc").forEach(function(c,i){
      const depth=(i%3+1)*0.4;
      c.style.transform="translate("+x*depth*10+"px,"+y*depth*5+"px)";
    });
  },{passive:true});
}

/* JARVIS DAY BRIEF */
function generateBrief(force){
  const key="brief-"+today();
  if(!force&&S.brief&&S.brief.key===key)return;
  if(S.briefLoading)return;
  S.briefLoading=true;render();
  const dd=day(today());
  const evCount=(dd.schedule||[]).length;
  const chCount=(dd.chores||[]).length;
  const intent=dd.journal||"";
  const hour=new Date().getHours();
  const w=S.weather;
  const prompt="You are Jarvis, a warm concise personal assistant. Write a 1-2 sentence day brief for "+S.userName+". Time: "+hour+"h. Weather: "+(w.ok?w.temp+"C "+w.cond:"unknown")+". Events today: "+evCount+". Chores: "+chCount+". Intention: "+(intent||"none set")+". Be motivating, personal, brief. No emojis. Reply with ONLY the brief text.";
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    let text="";
    if(data&&data.content){data.content.forEach(function(b){if(b.type==="text")text+=b.text;});}
    text=(text||"").trim();
    if(!text)text=fallbackBrief(hour);
    const brief={key:key,text:text};
    ss("dc2-brief",brief);
    S.brief=brief;S.briefLoading=false;render();
  }).catch(function(){
    const brief={key:key,text:fallbackBrief(hour)};
    ss("dc2-brief",brief);
    S.brief=brief;S.briefLoading=false;render();
  });
}
function fallbackBrief(hour){
  if(hour<5)return"Still up? Make this day count.";
  if(hour<12)return"Good morning. A fresh day is yours to shape.";
  if(hour<18)return"Keep the momentum going this afternoon.";
  return"Evening. Reflect, rest, and reset for tomorrow.";
}

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function tx(e,t){e.textContent=t;return e;}
function ap(p){for(let i=1;i<arguments.length;i++){if(arguments[i])p.appendChild(arguments[i]);}return p;}

function getTheme(code,hour){
  if(hour>=5&&hour<7)return"sunrise";
  if(hour>=19&&hour<21)return"sunset";
  if(hour<5||hour>=21)return"clear-night";
  if(code===0)return"clear-day";
  if(code<=3)return"cloudy";
  if(code<=51)return"drizzle";
  if(code<=67)return"rainy";
  if(code<=77)return"snowy";
  if(code<=82)return"heavy-rain";
  return"stormy";
}

function buildSkyLayers(wrap,theme){
  if(theme==="clear-night"){
    const sl=mk("div","star-layer");
    for(let i=0;i<70;i++){
      const s=mk("div","star");const size=Math.random()*2+0.5;
      s.style.cssText="width:"+size+"px;height:"+size+"px;left:"+Math.random()*100+"%;top:"+Math.random()*70+"%;animation-duration:"+(Math.random()*3+2)+"s;animation-delay:"+(Math.random()*3)+"s";
      sl.appendChild(s);
    }
    wrap.appendChild(sl);
  }
  const cl=mk("div","cloud-layer");
  ["c1","c2","c3","c4","c5"].forEach(function(c){cl.appendChild(mk("div","cloud "+c));});
  if(theme==="stormy"||theme==="cloudy"){
    for(let i=0;i<(theme==="stormy"?4:2);i++){
      const sc=mk("div","");
      const opacity=theme==="stormy"?0.6:0.3;
      sc.style.cssText="position:absolute;border-radius:60px;background:rgba(50,55,70,"+opacity+");filter:blur("+(theme==="stormy"?20:14)+"px);width:"+(200+i*60)+"px;height:"+(60+i*15)+"px;top:"+(8+i*16)+"%;left:"+(-20+i*15)+"%;animation:drift"+(i%2===0?"1":"2")+" "+(20+i*5)+"s linear infinite";
      cl.appendChild(sc);
    }
  }
  wrap.appendChild(cl);
  if(theme==="drizzle"){
    const rl=mk("div","rain-layer rain-drizzle");
    for(let i=0;i<30;i++){
      const r=mk("div","raindrop");const h=Math.random()*30+15;
      r.style.cssText="left:"+Math.random()*100+"%;height:"+h+"px;animation-duration:"+(Math.random()*0.6+0.9)+"s;animation-delay:"+(Math.random()*3)+"s";
      rl.appendChild(r);
    }
    wrap.appendChild(rl);
  }
  if(theme==="rainy"){
    const rl=mk("div","rain-layer rain-rain");
    for(let i=0;i<55;i++){
      const r=mk("div","raindrop");const h=Math.random()*50+30;
      r.style.cssText="left:"+Math.random()*100+"%;height:"+h+"px;animation-duration:"+(Math.random()*0.3+0.5)+"s;animation-delay:"+(Math.random()*2)+"s";
      rl.appendChild(r);
    }
    wrap.appendChild(rl);
  }
  if(theme==="heavy-rain"||theme==="stormy"){
    const rl=mk("div","rain-layer rain-heavy");
    const count=theme==="stormy"?90:70;
    for(let i=0;i<count;i++){
      const r=mk("div","raindrop");const h=Math.random()*80+50;
      r.style.cssText="left:"+Math.random()*100+"%;height:"+h+"px;animation-duration:"+(Math.random()*0.2+0.3)+"s;animation-delay:"+(Math.random()*1.5)+"s";
      rl.appendChild(r);
    }
    wrap.appendChild(rl);
    if(theme==="stormy")wrap.appendChild(mk("div","lightning"));
  }
  if(theme==="snowy"){
    const sl2=mk("div","snow-layer");
    for(let i=0;i<40;i++){
      const s=mk("div","snowflake");const size=Math.random()*4+2;
      s.style.cssText="width:"+size+"px;height:"+size+"px;left:"+Math.random()*100+"%;animation-duration:"+(Math.random()*4+4)+"s;animation-delay:"+(Math.random()*4)+"s";
      sl2.appendChild(s);
    }
    wrap.appendChild(sl2);
  }
}

function addSimpleRipple(wrap){
  wrap.addEventListener("touchstart",function(e){
    const t=e.touches[0];
    const r=mk("div","touch-ripple");
    r.style.cssText="width:60px;height:60px;left:"+(t.clientX-30)+"px;top:"+(t.clientY-30)+"px";
    wrap.appendChild(r);setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},700);
    wrap.querySelectorAll(".cloud").forEach(function(c){
      const rect=c.getBoundingClientRect();
      const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
      const dx=cx-t.clientX,dy=cy-t.clientY;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const force=Math.min(140/dist,25);
      c.style.transform="translate("+(dx/dist*force)+"px,"+(dy/dist*force)+"px)";
      setTimeout(function(){c.style.transform="";},500);
    });
  },{passive:true});
}

let clockTimer=null;
function startClock(){
  if(clockTimer)clearInterval(clockTimer);
  clockTimer=setInterval(function(){
    const el2=document.getElementById("lock-clock");
    if(!el2)return;
    const n=new Date();
    let h=n.getHours();const ampm=h>=12?"PM":"AM";
    h=h%12;if(h===0)h=12;
    const timeEl=el2.querySelector(".lock-clock-time");
    const ampmEl=el2.querySelector(".lock-clock-ampm");
    if(timeEl)timeEl.textContent=z(h)+":"+z(n.getMinutes());
    if(ampmEl)ampmEl.textContent=ampm;
  },1000);
}

      const l2=mk("div","slbl");tx(l2,"today");scroll.appendChild(l2);
      todayT.forEach(function(t){
        const item=mk("div","thought-item");
        const ttxt=mk("div","thought-text");tx(ttxt,t.text);
        const tmeta=mk("div","thought-meta");tx(tmeta,t.time);
        const tdel=mk("button","thought-del");tx(tdel,"×");
        tdel.addEventListener("click",function(){deleteThought(t.id);});
        ap(item,ttxt,tmeta,tdel);scroll.appendChild(item);
      });
    }
    if(olderT.length){
      const l3=mk("div","slbl");tx(l3,"earlier");scroll.appendChild(l3);
      olderT.slice(0,10).forEach(function(t){
        const item=mk("div","thought-item");
        const ttxt=mk("div","thought-text");tx(ttxt,t.text);
        const tmeta=mk("div","thought-meta");tx(tmeta,t.date+" · "+t.time);
        const tdel=mk("button","thought-del");tx(tdel,"×");
        tdel.addEventListener("click",function(){deleteThought(t.id);});
        ap(item,ttxt,tmeta,tdel);scroll.appendChild(item);
      });
    }
    if(!S.thoughts.length){const em=mk("div","empty");tx(em,"No thoughts yet. Write something.");scroll.appendChild(em);}
  }

  // WEEK VIEW — cube grid
  if(nav==="week"){
    const todayData=day(T);
    if(todayData.journal||S.mIntent[MKEY]){
      const wib=mk("div","week-intent-banner");
      const wibIcon=mk("span","wib-icon");tx(wibIcon,"✦");
      wib.appendChild(wibIcon);
      if(todayData.journal){
        const wibText=mk("div","wib-text");tx(wibText,'"'+todayData.journal+'"');
        wib.appendChild(wibText);
      }
      const wibDay=mk("div","wib-day");tx(wibDay,"Theme · "+fmtDate(T));
      wib.appendChild(wibDay);
      if(S.mIntent[MKEY]){
        const wibM=mk("div","intent-month");
        tx(wibM,"✦ "+MONTHS[parseInt(MKEY.slice(5,7))-1]+" · "+S.mIntent[MKEY]);
        wib.appendChild(wibM);
      }
      scroll.appendChild(wib);
    }
    const lbl=mk("div","slbl");tx(lbl,"week at a glance");scroll.appendChild(lbl);
    const grid=mk("div","week-cube-grid");
    const blockColors=["#5B4FE9","#E8A87C","#8BA888","#A08FFF","#E85454","#4A90D9"];
    wd.forEach(function(d){
      const k=pad(d);const data=S.data[k]||Object.assign({},initDay);const isT=k===T;
      const cube=mk("div","week-cube"+(isT?" wc-today":"")+(k===sel?" wc-sel":""));
      cube.addEventListener("click",function(){set({sel:k,nav:"today",tab:"chores"});});
      const top2=mk("div","wc-top");
      const wcDay=mk("div","wc-day");tx(wcDay,DAYS[d.getDay()]);
      const wcNum=mk("div","wc-num");tx(wcNum,String(d.getDate()));
      ap(top2,wcDay,wcNum);
      if(isT)top2.appendChild(mk("div","wc-today-dot"));
      cube.appendChild(top2);
      const blocks=mk("div","wc-blocks");
      const evs=(data.schedule||[]).slice(0,6);
      if(evs.length){
        evs.forEach(function(ev,bi){
          const chip=mk("div","wc-ev-chip");
          chip.style.borderLeft="3px solid "+blockColors[bi%blockColors.length];
          const ct=mk("span","wc-ev-chip-time");tx(ct,ev.time);
          const cl=mk("span","wc-ev-chip-label");tx(cl,ev.label);
          ap(chip,ct,cl);
          chip.title=ev.time+" "+ev.label;
          blocks.appendChild(chip);
        });
      } else {
        const emptyBar=mk("div","wc-empty-bar");tx(emptyBar,"—");
        blocks.appendChild(emptyBar);
      }
      cube.appendChild(blocks);
      const foot=mk("div","wc-footer");
      if(data.journal)foot.appendChild(mk("div","wc-intent-dot"));
      const dnCnt=(data.chores||[]).filter(function(_,i){return done(k,i);}).length;
      if((data.chores||[]).length){
        const cp=mk("span","wc-chore-pill");tx(cp,dnCnt+"/"+(data.chores||[]).length);
        foot.appendChild(cp);
      }
      cube.appendChild(foot);
      grid.appendChild(cube);
    });
    scroll.appendChild(grid);
  }

  // PLAN VIEW
  if(nav==="plan"){
    const mkey=S.planMonth;
    const mDate=new Date(mkey+"-15T12:00:00");

    // Month header + navigation
    const mh=mk("div","month-hdr");
    const mhLeft=mk("div","");
    const mTitle=mk("div","month-title");tx(mTitle,MONTHS[mDate.getMonth()]+" "+mDate.getFullYear());
    const mSub=mk("div","month-sub");tx(mSub,"Tap a day to plan it");
    ap(mhLeft,mTitle,mSub);
    const mNav=mk("div","month-nav");
    const prevB=mk("button","mnav-btn");tx(prevB,"‹");
    prevB.addEventListener("click",function(){
      const d2=new Date(mkey+"-15T12:00:00");d2.setMonth(d2.getMonth()-1);
      set({planMonth:d2.getFullYear()+"-"+z(d2.getMonth()+1)});
    });
    const nextB=mk("button","mnav-btn");tx(nextB,"›");
    nextB.addEventListener("click",function(){
      const d2=new Date(mkey+"-15T12:00:00");d2.setMonth(d2.getMonth()+1);
      set({planMonth:d2.getFullYear()+"-"+z(d2.getMonth()+1)});
    });
    ap(mNav,prevB,nextB);ap(mh,mhLeft,mNav);scroll.appendChild(mh);

    // Calendar grid — workdays highlighted, weekends warm & relaxing
    const grid=mk("div","month-grid");
    ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(function(dw,di){
      const dd2=mk("div","mg-dow"+(di>=5?" we":""));tx(dd2,dw);
      grid.appendChild(dd2);
    });
    const first=new Date(mkey+"-01T12:00:00");
    const firstDow=(first.getDay()+6)%7;
    const daysInMonth=new Date(first.getFullYear(),first.getMonth()+1,0).getDate();
    for(let e2=0;e2<firstDow;e2++){grid.appendChild(mk("div","mg-day mg-empty"));}
    for(let dn=1;dn<=daysInMonth;dn++){
      const cellDate=new Date(first.getFullYear(),first.getMonth(),dn,12);
      const k=pad(cellDate);
      const dow=(cellDate.getDay()+6)%7;
      const isWE=dow>=5;
      const isTod=k===T;
      const isPast=k<T;
      const cell=mk("div","mg-day "+(isWE?"mg-weekend":"mg-work")+(isTod?" mg-today":"")+(k===planDay?" mg-sel":"")+(isPast?" mg-past":""));
      const num=mk("div","mg-num");tx(num,String(dn));
      cell.appendChild(num);
      const dData=S.data[k];
      const dots=mk("div","mg-dots");
      if(dData&&(dData.schedule||[]).length){const d1=mk("div","mg-dot");d1.style.background="#5B4FE9";dots.appendChild(d1);}
      if(dData&&(dData.chores||[]).length){const d2=mk("div","mg-dot");d2.style.background="#8BA888";dots.appendChild(d2);}
      if(dData&&dData.journal){const d3=mk("div","mg-dot");d3.style.background="#A08FFF";dots.appendChild(d3);}
      cell.appendChild(dots);
      cell.addEventListener("click",function(){set({planDay:k});});
      grid.appendChild(cell);
    }
    scroll.appendChild(grid);

    const pd=day(planDay);
    const planDateObj=new Date(planDay+"T12:00:00");
    const ph=mk("div","plan-header");
    const ptitle=mk("div","plan-title");tx(ptitle,DAYS[planDateObj.getDay()]+", "+planDateObj.getDate()+" "+MONTHS[planDateObj.getMonth()]);
    const psub=mk("div","plan-sub");tx(psub,"Planning this day");
    ap(ph,ptitle,psub);scroll.appendChild(ph);

    const sl1=mk("div","slbl");tx(sl1,"schedule");scroll.appendChild(sl1);
    if(!pd.schedule.length){const em=mk("div","empty");tx(em,"No events planned. Tap ＋ to add.");scroll.appendChild(em);}
    const planSched=mk("div","sched-list");
    pd.schedule.forEach(function(item,i){
      const isActive=S.activeSchedItem===(planDay+"-"+i);
      const wrap2=mk("div","");
      const row=mk("div","sitem");row.style.cursor="pointer";
      row.addEventListener("click",function(){set({activeSchedItem:isActive?null:(planDay+"-"+i)});});
      const stime=mk("span","stime");tx(stime,item.time);
      const sdot=mk("div","sdot");
      const slabel=mk("span","slabel");tx(slabel,item.label);
      ap(row,stime,sdot,slabel);wrap2.appendChild(row);
      if(isActive){
        const btns=mk("div","sitem-btns");
        const editB=mk("button","sitem-btn");tx(editB,"✏️ Edit");
        editB.addEventListener("click",function(e){e.stopPropagation();editEvent(planDay,i);});
        const delB=mk("button","sitem-btn");tx(delB,"🗑 Delete");
        delB.addEventListener("click",function(e){
          e.stopPropagation();
          set({activeSchedItem:null});
          confirmDelete('Delete "'+item.label+'"?',function(){deleteEvent(planDay,i);});
        });
        ap(btns,editB,delB);wrap2.appendChild(btns);
      }
      planSched.appendChild(wrap2);
    });
    scroll.appendChild(planSched);
    const sadd2=mk("button","sadd-btn");tx(sadd2,"＋  add event");
    sadd2.addEventListener("click",function(){set({modal:true,mdest:planDay,mtime:"",mval:"",meditIdx:null});});
    scroll.appendChild(sadd2);

    const sl2=mk("div","slbl");tx(sl2,"chores");scroll.appendChild(sl2);
    pd.chores.forEach(function(c){
      const row=mk("div","citem");
      const chk=mk("div","ccheck");
      const ctxt=mk("span","ctxt");tx(ctxt,c);
      ap(row,chk,ctxt);scroll.appendChild(row);
    });
    if(S.adding){
      const addRow=mk("div","add-row");
      const inp=mk("input","add-inp");inp.type="text";inp.placeholder="Add a chore...";inp.value=S.newChore;
      inp.addEventListener("input",function(e){S.newChore=e.target.value;});
      inp.addEventListener("keydown",function(e){if(e.key==="Enter")addChore(planDay);});
      const savBtn=mk("button","add-save");tx(savBtn,"Add");savBtn.addEventListener("click",function(){addChore(planDay);});
      ap(addRow,inp,savBtn);scroll.appendChild(addRow);
    } else {
      const addGhost=mk("button","add-btn-ghost");tx(addGhost,"+ add chore");
      addGhost.addEventListener("click",function(){set({adding:true});});
      scroll.appendChild(addGhost);
    }

    if(!isDesktop()){
      const sl4=mk("div","slbl");tx(sl4,"health");scroll.appendChild(sl4);
      const hbTrig=mk("button","healthbar-trigger");
      const hbi=mk("span","hbt-icon");tx(hbi,"❤️");
      const hbt=mk("div","hbt-text");
      const hbtt=mk("div","hbt-title");tx(hbtt,"Open Health Bar");
      const hbts=mk("div","hbt-sub");tx(hbts,"Log weight, mood & more");
      ap(hbt,hbtt,hbts);
      const hba=mk("span","hbt-arrow");tx(hba,"→");
      ap(hbTrig,hbi,hbt,hba);
      hbTrig.addEventListener("click",function(){set({healthModal:true});});
      scroll.appendChild(hbTrig);
    }

    const sl5=mk("div","slbl");tx(sl5,"intention for "+MONTHS[mDate.getMonth()]);scroll.appendChild(sl5);
    const mcard=mk("div","mcard");
    const mlbl=mk("div","mcard-lbl");tx(mlbl,"A lighter theme for the month");
    const mta=mk("textarea","mcard-ta");mta.placeholder="What's the bigger picture this month…";mta.rows=2;
    mta.value=S.mDraft[mkey]!==undefined?S.mDraft[mkey]:(S.mIntent[mkey]||"");
    mta.addEventListener("input",function(e){S.mDraft[mkey]=e.target.value;});
    const msave=mk("button","mcard-save");tx(msave,"Set month theme ✦");
    msave.addEventListener("click",function(){saveMonthIntent(mkey);});
    ap(mcard,mlbl,mta,msave);scroll.appendChild(mcard);
  }

  target.appendChild(scroll);

  if(contentArea)wrap.appendChild(contentArea);

  // ── DESKTOP RIGHT PANEL — contextual per view ──
  if(isDesktop()){
    const rp=mk("div","");rp.id="right-panel";

    if(nav==="today"){
      // Weekly view (pressable → Week) + water
      const rpHdr=mk("div","rp-hdr");tx(rpHdr,"This week");rp.appendChild(rpHdr);
      const wkWrap=mk("div","rp-pressable");
      wd.forEach(function(d){
        const k=pad(d);const data=S.data[k]||{chores:DAILY_DEFAULTS.slice(),schedule:[],journal:"",temp:"--"};const isT=k===T;
        const card=mk("div","wcard"+(isT?" today":""));
        card.style.marginBottom="8px";card.style.pointerEvents="none";
        const top2=mk("div","wcard-top");
        const left=mk("div","");
        const wname=mk("span","wcard-name");tx(wname,DAYS[d.getDay()]);
        const wsub=mk("span","wcard-sub");tx(wsub,String(d.getDate()));
        ap(left,wname,wsub);
        if(isT){const badge=mk("span","badge");tx(badge,"Today");left.appendChild(badge);}
        ap(top2,left);card.appendChild(top2);
        if((data.schedule||[]).length){
          const tgs=mk("div","tags");
          (data.schedule||[]).slice(0,2).forEach(function(s){const t=mk("span","tag");tx(t,s.time+" "+s.label);tgs.appendChild(t);});
          card.appendChild(tgs);
        }
        const dnCnt=(data.chores||[]).filter(function(_,i){return done(k,i);}).length;
        if((data.chores||[]).length){const wcd=mk("div","wcard-done");tx(wcd,"✓ "+dnCnt+"/"+(data.chores||[]).length);card.appendChild(wcd);}
        wkWrap.appendChild(card);
      });
      const hint=mk("div","rp-press-hint");tx(hint,"Tap to open week →");
      wkWrap.appendChild(hint);
      wkWrap.addEventListener("click",function(){navTo("week");});
      rp.appendChild(wkWrap);
      buildWaterCard(rp);

    } else if(nav==="week"){
      // Monthly calendar (pressable → Plan) + hero only
      const rpHdr=mk("div","rp-hdr");tx(rpHdr,"This month");rp.appendChild(rpHdr);
      const calWrap=mk("div","rp-pressable");
      buildMiniMonth(calWrap);
      const hint=mk("div","rp-press-hint");tx(hint,"Tap to open plan →");
      calWrap.appendChild(hint);
      calWrap.addEventListener("click",function(){navTo("plan");});
      rp.appendChild(calWrap);
      // hero only — opens health popup
      const hero=mk("div","health-hero");hero.style.marginTop="16px";
      const hl=mk("div","hh-lbl");tx(hl,"Year in Health");
      const ht=mk("div","hh-title");tx(ht,"Your body, tracked all year");
      const hs=mk("div","hh-sub");tx(hs,"Log daily. Get a full performance report every December.");
      const hc=mk("div","hh-cta");tx(hc,"Start tracking →");
      ap(hero,hl,ht,hs,hc);
      hero.addEventListener("click",function(){set({healthModal:true});});
      rp.appendChild(hero);

    } else if(nav==="plan"){
      // Day preview
      const pdd=day(planDay);
      const pdDate=new Date(planDay+"T12:00:00");
      const dph=mk("div","dp-hdr");tx(dph,"Day preview");rp.appendChild(dph);
      const dpt=mk("div","dp-title");tx(dpt,DAYS[pdDate.getDay()]+", "+pdDate.getDate()+" "+MONTHS[pdDate.getMonth()]);rp.appendChild(dpt);
      const dps=mk("div","dp-sub");tx(dps,(pdd.schedule||[]).length+" events · "+(pdd.chores||[]).length+" chores");rp.appendChild(dps);
      if((pdd.schedule||[]).length){
        const s1=mk("div","dp-sec");tx(s1,"Schedule");rp.appendChild(s1);
        pdd.schedule.forEach(function(ev){
          const row=mk("div","dp-ev");
          const t=mk("span","dp-ev-time");tx(t,ev.time);
          const l=mk("span","dp-ev-label");tx(l,ev.label);
          ap(row,t,l);rp.appendChild(row);
        });
      }
      if((pdd.chores||[]).length){
        const s2=mk("div","dp-sec");tx(s2,"Chores");rp.appendChild(s2);
        pdd.chores.forEach(function(c){
          const row=mk("div","dp-chore");
          const dot=mk("div","dp-chore-dot");const s=mk("span","");tx(s,c);
          ap(row,dot,s);rp.appendChild(row);
        });
      }
      if(!(pdd.schedule||[]).length&&!(pdd.chores||[]).length){
        const em=mk("div","dp-empty");tx(em,"Nothing planned yet. Tap ＋ to start.");rp.appendChild(em);
      }
      // Health bar trigger in right panel
      const hbTrigger=mk("button","healthbar-trigger");hbTrigger.style.marginTop="20px";
      const hbIcon=mk("span","hbt-icon");tx(hbIcon,"❤️");
      const hbText=mk("div","hbt-text");
      const hbTitle=mk("div","hbt-title");tx(hbTitle,"Open Health Bar");
      const hbSub=mk("div","hbt-sub");tx(hbSub,"Log weight, mood & more");
      ap(hbText,hbTitle,hbSub);
      const hbArrow=mk("span","hbt-arrow");tx(hbArrow,"→");
      ap(hbTrigger,hbIcon,hbText,hbArrow);
      hbTrigger.addEventListener("click",function(){set({healthModal:true});});
      rp.appendChild(hbTrigger);
    }
    wrap.appendChild(rp);
  }

  // ── PHONE BOTTOM NAV ──
  if(!isTablet()){
    const bnav=mk("div","");bnav.id="bnav";
    [["today","📅","Today"],["week","🗓","Week"],["plan","✏️","Plan"]].forEach(function(item){
      const btn=mk("button","nbtn"+(nav===item[0]?" on":""));
      const iconWrap=mk("div","nbtn-icon");
      const icon=mk("span","");tx(icon,item[1]);
      iconWrap.appendChild(icon);
      const lbl=mk("span","nlbl");tx(lbl,item[2]);
      ap(btn,iconWrap,lbl);
      btn.addEventListener("click",function(){if(nav!==item[0])navTo(item[0]);});
      bnav.appendChild(btn);
    });
    wrap.appendChild(bnav);
  }
  return wrap;
}

function renderModal(){
  const isEdit=S.meditIdx!==null&&S.meditIdx!==undefined;
  const ov=mk("div","moverlay");ov.addEventListener("click",function(){set({modal:false});});
  const sheet=mk("div","msheet");sheet.addEventListener("click",function(e){e.stopPropagation();});
  const handle=mk("div","mhandle");
  const mtitle=mk("div","mtitle");tx(mtitle,isEdit?"Edit event":"Add event");
  const msub=mk("div","msub");tx(msub,fmtDate(S.mdest));
  const ti=mk("input","minput");ti.type="time";ti.value=S.mtime;ti.addEventListener("input",function(e){S.mtime=e.target.value;});
  const vi=mk("input","minput");vi.type="text";vi.placeholder="What's happening?";vi.value=S.mval;
  vi.addEventListener("input",function(e){S.mval=e.target.value;});
  vi.addEventListener("keydown",function(e){if(e.key==="Enter")saveEvent();});
  const mr=mk("div","mrow");
  const cancelBtn=mk("button","mbtn sec");tx(cancelBtn,"Cancel");cancelBtn.addEventListener("click",function(){set({modal:false});});
  const saveBtn=mk("button","mbtn pri");tx(saveBtn,isEdit?"Update":"Save");saveBtn.addEventListener("click",saveEvent);
  ap(mr,cancelBtn,saveBtn);ap(sheet,handle,mtitle,msub,ti,vi,mr);ov.appendChild(sheet);
  setTimeout(function(){vi.focus();},100);
  return ov;
}

function renderConfirm(){
  const ov=mk("div","confirm-overlay");ov.addEventListener("click",function(){set({confirmMsg:null,confirmAction:null});});
  const box=mk("div","confirm-box");box.addEventListener("click",function(e){e.stopPropagation();});
  const msg=mk("div","confirm-msg");tx(msg,S.confirmMsg);
  const row=mk("div","confirm-row");
  const cancelBtn=mk("button","confirm-cancel");tx(cancelBtn,"Cancel");cancelBtn.addEventListener("click",function(){set({confirmMsg:null,confirmAction:null});});
  const okBtn=mk("button","confirm-ok");tx(okBtn,"Delete");
  okBtn.addEventListener("click",function(){const fn=S.confirmAction;set({confirmMsg:null,confirmAction:null});if(fn)fn();});
  ap(row,cancelBtn,okBtn);ap(box,msg,row);ov.appendChild(box);
  return ov;
}

function renderActionMenu(){
  const x=S.actionMenu.x,y=S.actionMenu.y,items=S.actionMenu.items;
  const frag=document.createDocumentFragment();
  const ov=mk("div","menu-overlay");ov.addEventListener("click",function(){set({actionMenu:null});});
  const menu=mk("div","action-menu");
  menu.style.left=x+"px";menu.style.top=Math.min(y,window.innerHeight-220)+"px";
  items.forEach(function(item,i){
    if(i>0){menu.appendChild(mk("div","action-menu-divider"));}
    const btn=mk("button","action-menu-item"+(item.danger?" danger":""));
    tx(btn,item.icon+" "+item.label);
    btn.addEventListener("click",function(){set({actionMenu:null});item.action();});
    menu.appendChild(btn);
  });
  frag.appendChild(ov);frag.appendChild(menu);
  return frag;
}

function render(){
  const root=document.getElementById("app");
  const prevScroll=root.querySelector(".scroll");
  const savedTop=prevScroll?prevScroll.scrollTop:0;
  root.innerHTML="";
  const mainEl=S.view==="lock"?renderLock():renderMain();
  if(S.navAnim){mainEl.classList.add("nav-animating");}
  if(S.navEntering==="right"){mainEl.classList.add("nav-entering");}
  if(S.navEntering==="left"){mainEl.classList.add("nav-entering-left");}
  root.appendChild(mainEl);
  if(S.modal)root.appendChild(renderModal());
  if(S.healthModal){
    const ov=mk("div","health-modal-overlay");
    ov.addEventListener("click",function(){set({healthModal:false});});
    ov.appendChild(buildHealthModalContent());
    root.appendChild(ov);
  }
  if(S.actionMenu)root.appendChild(renderActionMenu());
  if(S.confirmMsg)root.appendChild(renderConfirm());
  if(S.toast){const t=mk("div","toast");tx(t,S.toast);root.appendChild(t);}
  if(savedTop>0&&!S.navAnim){const ns=root.querySelector(".scroll");if(ns)ns.scrollTop=savedTop;}
}

let resizeTimer=null;
let lastW=window.innerWidth;
window.addEventListener("resize",function(){
  var w=window.innerWidth;
  var crossed=(lastW<768)!==(w<768)||(lastW<1200)!==(w<1200);
  lastW=w;
  if(!crossed)return;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(render,150);
});

render();
fetchWeather();
initGyro();
startClock();
generateBrief(false);
</script>
</body>
</html>
